<ng-container *ngIf="auth.isAuthenticated(); else publicLayout">
  <mat-sidenav-container class="app-shell">
    <mat-sidenav mode="side" opened class="app-sidenav">
      <div class="sidenav-header">
        <mat-icon class="sidenav-logo">smart_toy</mat-icon>
        <div class="sidenav-title">Chatbot Platform</div>
      </div>

      <mat-nav-list>
        <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
          <mat-icon matListIcon>dashboard</mat-icon>
          <span matLine>Dashboard</span>
        </a>
        <a mat-list-item routerLink="/bots" routerLinkActive="active">
          <mat-icon matListIcon>smart_toy</mat-icon>
          <span matLine>Bots</span>
        </a>
        <a mat-list-item routerLink="/bots/create" routerLinkActive="active">
          <mat-icon matListIcon>add_circle</mat-icon>
          <span matLine>Criar Bot</span>
        </a>
        <a mat-list-item routerLink="/conversations" routerLinkActive="active">
          <mat-icon matListIcon>chat</mat-icon>
          <span matLine>Conversas</span>
        </a>

        <!-- Novos Módulos -->
        <mat-divider></mat-divider>
        <mat-subheader>Funcionalidades Avançadas</mat-subheader>

        <a mat-list-item routerLink="/professional" routerLinkActive="active">
          <mat-icon matListIcon>business</mat-icon>
          <span matLine>Gerenciamento Profissional</span>
        </a>
        <a mat-list-item routerLink="/compliance" routerLinkActive="active">
          <mat-icon matListIcon>security</mat-icon>
          <span matLine>Compliance & Segurança</span>
        </a>
        <a mat-list-item routerLink="/analytics-advanced" routerLinkActive="active">
          <mat-icon matListIcon>analytics</mat-icon>
          <span matLine>Analytics Avançado</span>
        </a>

        <mat-divider></mat-divider>
        <a mat-list-item routerLink="/audit-logs" routerLinkActive="active">
          <mat-icon matListIcon>history</mat-icon>
          <span matLine>Audit Logs</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <mat-toolbar color="primary" class="app-toolbar">
        <span class="toolbar-title">Chatbot Platform</span>
        <span class="spacer"></span>
        <button mat-button (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sair</span>
        </button>
      </mat-toolbar>

      <div class="app-content">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</ng-container>

<ng-template #publicLayout>
  <mat-toolbar color="primary" class="public-toolbar">
    <span class="toolbar-title">Chatbot Platform</span>
    <span class="spacer"></span>
    <a mat-button routerLink="/login">Login</a>
  </mat-toolbar>
  <div class="public-content">
    <router-outlet></router-outlet>
  </div>
</ng-template>
