<div style="max-width:1100px;margin:20px auto;">
  <mat-card>
    <mat-card-title>Gerenciamento de Bots</mat-card-title>

    <mat-card-content>
      <div style="display:flex; flex-wrap:wrap; gap:16px; align-items:center; margin-bottom:16px;">
        <mat-form-field appearance="outline" style="flex:1 1 240px; min-width:220px;">
          <mat-label>Buscar por nome ou chave</mat-label>
          <input matInput [(ngModel)]="filter" placeholder="Ex: atendimento, suporte, bot-key-01" />
        </mat-form-field>

        <mat-form-field appearance="outline" style="width:200px;">
          <mat-label>Status</mat-label>
          <mat-select [(ngModel)]="statusFilter">
            <mat-option value="ALL">Todos</mat-option>
            <mat-option value="ENABLED">Ativos</mat-option>
            <mat-option value="DISABLED">Inativos</mat-option>
          </mat-select>
        </mat-form-field>

        <span style="flex:1 1 auto;"></span>

        <button mat-raised-button color="primary" routerLink="/bots/create">
          <mat-icon>add</mat-icon>
          <span>Novo Bot</span>
        </button>
      </div>

      <div *ngIf="filteredBots.length === 0; else botsTable">
        <p>Nenhum bot encontrado com os filtros atuais.</p>
      </div>

      <ng-template #botsTable>
        <table mat-table [dataSource]="filteredBots" class="mat-elevation-z1" style="width:100%">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let bot">
              <div style="font-weight:500;">{{ bot.name }}</div>
              <div style="font-size:12px; color:#666;">{{ bot.key }}</div>
            </td>
          </ng-container>

          <ng-container matColumnDef="key">
            <th mat-header-cell *matHeaderCellDef>Chave</th>
            <td mat-cell *matCellDef="let bot">
              <code>{{ bot.key }}</code>
            </td>
          </ng-container>

          <ng-container matColumnDef="enabled">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let bot">
              <mat-chip [color]="bot.enabled ? 'primary' : 'warn'" selected>
                {{ bot.enabled ? 'Ativo' : 'Inativo' }}
              </mat-chip>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef style="text-align:right;">Ações</th>
            <td mat-cell *matCellDef="let bot" style="text-align:right;">
              <button mat-stroked-button color="primary" (click)="toggle(bot)">
                <mat-icon>{{ bot.enabled ? 'pause_circle' : 'play_circle' }}</mat-icon>
                <span>{{ bot.enabled ? 'Desativar' : 'Ativar' }}</span>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </ng-template>
    </mat-card-content>
  </mat-card>
</div>
