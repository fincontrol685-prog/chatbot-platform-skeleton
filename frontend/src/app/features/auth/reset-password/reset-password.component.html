<div class="auth-container">
  <mat-card class="auth-card">
    <div class="auth-header">
      <h2>Redefinir senha</h2>
      <p>Escolha uma nova senha para sua conta</p>
    </div>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Nova senha</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="new-password" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Confirme a nova senha</mat-label>
          <input matInput type="password" formControlName="confirmPassword" autocomplete="new-password" />
        </mat-form-field>

        @if (error) {
          <div class="auth-error">
            <mat-icon>error</mat-icon>
            <span>{{ error }}</span>
          </div>
        }

        @if (success) {
          <div class="auth-success">
            <mat-icon>check_circle</mat-icon>
            <span>{{ success }}</span>
          </div>
        }

        <button mat-raised-button color="primary" type="submit" [disabled]="loading || form.invalid" class="submit-button">
          @if (!loading) {
            <span>Redefinir senha</span>
          }
          @if (loading) {
            <span>Redefinindo...</span>
          }
        </button>

        <div class="auth-footer-links">
          <a routerLink="/login">Voltar para o login</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
