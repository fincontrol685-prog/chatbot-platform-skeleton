<div style="max-width:400px;margin:40px auto;">
  <mat-card>
    <mat-card-title>Login</mat-card-title>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="fill" style="width:100%">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" />
          <mat-error *ngIf="form.get('username')?.hasError('required')">Username é obrigatório</mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" style="width:100%">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" />
          <mat-error *ngIf="form.get('password')?.hasError('required')">Password é obrigatório</mat-error>
        </mat-form-field>

        <div style="margin-top:16px">
          <button mat-raised-button color="primary" type="submit">Login</button>
        </div>
        <div *ngIf="error" style="color:red;margin-top:8px">{{error}}</div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
