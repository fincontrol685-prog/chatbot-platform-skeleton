<div class="auth-container">
  <mat-card class="auth-card">
    <div class="auth-header">
      <h2>Esqueci minha senha</h2>
      <p>Informe seu email para receber o link de redefinição</p>
    </div>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" autocomplete="email" />
        </mat-form-field>

        <div *ngIf="error" class="auth-error">
          <mat-icon>error</mat-icon>
          <span>{{ error }}</span>
        </div>

        <div *ngIf="success" class="auth-success">
          <mat-icon>check_circle</mat-icon>
          <span>{{ success }}</span>
        </div>

        <button mat-raised-button color="primary" type="submit" [disabled]="loading || form.invalid" class="submit-button">
          <span *ngIf="!loading">Enviar instruções</span>
          <span *ngIf="loading">Enviando...</span>
        </button>

        <div class="auth-footer-links">
          <a routerLink="/login">Voltar para o login</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
