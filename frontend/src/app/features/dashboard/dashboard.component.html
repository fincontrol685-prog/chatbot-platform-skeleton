<div style="max-width:1000px;margin:40px auto;min-height:100vh;">
  <mat-card style="margin-bottom:20px">
    <mat-card-header>
      <mat-card-title>Bem-vindo à Plataforma de Chatbots</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p style="font-size: 16px; color: #666; margin: 16px 0;">
        Este é um aplicativo de gerenciamento de chatbots. Faça login para começar a criar e gerenciar seus bots.
      </p>
      <div style="margin-top: 20px;">
        <button mat-raised-button color="primary" routerLink="/login" style="margin-right: 10px;">
          <mat-icon style="margin-right: 8px;">login</mat-icon>
          Faça Login
        </button>
        <button mat-button routerLink="/bots">
          <mat-icon style="margin-right: 8px;">list</mat-icon>
          Ir para Bots
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-header>
      <mat-card-title>Recursos</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <ul style="line-height: 1.8;">
        <li>✓ Criar e gerenciar chatbots</li>
        <li>✓ Ativar/desativar bots</li>
        <li>✓ Configurar comportamento dos bots</li>
        <li>✓ Monitorar performance dos bots</li>
      </ul>
    </mat-card-content>
  </mat-card>
</div>
