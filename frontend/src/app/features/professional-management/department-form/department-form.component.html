<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Nome</mat-label>
    <input matInput formControlName="name" />
    <mat-error *ngIf="form.get('name')?.hasError('required')">Nome é obrigatório</mat-error>
    <mat-error *ngIf="form.get('name')?.hasError('minlength')">Mínimo 3 caracteres</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Código</mat-label>
    <input matInput formControlName="code" />
    <mat-error *ngIf="form.get('code')?.hasError('required')">Código é obrigatório</mat-error>
    <mat-error *ngIf="form.get('code')?.hasError('minlength')">Mínimo 2 caracteres</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Localização</mat-label>
    <input matInput formControlName="location" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Descrição</mat-label>
    <textarea matInput formControlName="description" rows="3"></textarea>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Departamento Pai (opcional)</mat-label>
    <mat-select formControlName="parentDepartmentId">
      <mat-option [value]="null">Nenhum</mat-option>
      <mat-option *ngFor="let dept of departments" [value]="dept.id">
        {{ dept.name }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <div *ngIf="error" class="state-card state-card--error">{{ error }}</div>

  <div class="form-actions">
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading">
      <mat-icon *ngIf="!loading">save</mat-icon>
      <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
      {{ department ? 'Atualizar' : 'Criar' }}
    </button>
    <button mat-button type="button" (click)="cancel()">Cancelar</button>
  </div>
</form>
