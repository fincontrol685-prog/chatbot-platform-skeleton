<div class="container">
  <div class="header">
    <h1>Conversas</h1>
    <button mat-raised-button color="primary">Nova Conversa</button>
  </div>

  <mat-card>
    <mat-card-content>
      <table mat-table [dataSource]="conversations" class="full-width-table">
        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let element">{{ element.id }}</td>
        </ng-container>

        <!-- Title Column -->
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>Título</th>
          <td mat-cell *matCellDef="let element">{{ element.title }}</td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let element">
            <mat-chip [color]="getStatusColor(element.status)" selected>
              {{ element.status }}
            </mat-chip>
          </td>
        </ng-container>

        <!-- Message Count Column -->
        <ng-container matColumnDef="messageCount">
          <th mat-header-cell *matHeaderCellDef>Mensagens</th>
          <td mat-cell *matCellDef="let element">{{ element.messageCount }}</td>
        </ng-container>

        <!-- Created At Column -->
        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef>Criada em</th>
          <td mat-cell *matCellDef="let element">
            {{ element.createdAt | date: 'dd/MM/yyyy HH:mm' }}
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="primary" [routerLink]="['/conversations', element.id]">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="closeConversation(element.id)"
              [disabled]="element.status === 'CLOSED'">
              <mat-icon>close</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator
        [pageSizeOptions]="[5, 10, 20, 50]"
        [pageSize]="pageSize"
        [length]="totalElements"
        (page)="onPageChange($event)">
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
