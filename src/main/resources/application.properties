spring.application.name=chatbot-platform-skeleton

# H2 datasource for local development
spring.datasource.url=jdbc:h2:mem:chatbotdb;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# JWT
security.jwt.secret=changeitchangeitchangeitchangeit
security.jwt.expiration-ms=900000

# Flyway location
spring.flyway.locations=classpath:db/migration,db/migrations,db/migrations

# CORS
cors.allowed-origins=http://localhost:4200
