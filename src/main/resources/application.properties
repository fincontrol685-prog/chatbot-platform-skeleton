spring.application.name=chatbot-platform-skeleton

# H2 datasource for local development
spring.datasource.url=jdbc:mysql://localhost:3306/chatBox?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=roberto
spring.datasource.password=Senha@123
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

# JWT
security.jwt.secret=changeitchangeitchangeitchangeit
security.jwt.expiration-ms=900000


# CORS
cors.allowed-origins=http://localhost:4200

# Springdoc OpenAPI (Swagger UI)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=false
springdoc.use-fqn=true

# Redis Cache Configuration (Phase 3)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000ms
spring.data.redis.password=

# Spring Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# Custom Cache Profiles
cache.bot-config.ttl-minutes=60
cache.bot-config.max-size=500
cache.bot-config.enabled=true

cache.intent-analysis.ttl-minutes=30
cache.intent-analysis.max-size=5000
cache.intent-analysis.enabled=true

cache.response-plan.ttl-minutes=5
cache.response-plan.max-size=1000
cache.response-plan.enabled=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=junbob@gmail.com
spring.mail.password=mrbz osgh hcpz bvqh
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true   

# Rate Limiting Configuration (Phase 4)
# Enables or disables rate limiting globally
ratelimit.enabled=true

# User-based rate limiting (authenticated endpoints)
# Default: 10 requests per 1 minute
ratelimit.user.requests=10
ratelimit.user.interval-minutes=1

# IP-based rate limiting (unauthenticated endpoints like login)
# Default: 5 requests per 1 minute per IP
ratelimit.ip.requests=5
ratelimit.ip.interval-minutes=1

# Analytics endpoints rate limiting
# Default: 30 requests per 1 minute per user
ratelimit.analytics.requests=30
ratelimit.analytics.interval-minutes=1

# Monitoring & Observability Configuration (Phase 5)
# Actuator endpoints for metrics and health
management.endpoints.web.exposure.include=health,metrics,prometheus,info,env
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.info.enabled=true

# Prometheus metrics configuration
management.metrics.export.prometheus.enabled=true
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.logback=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=development

# Logging Configuration for Structured Logging (Phase 5)
logging.level.root=INFO
logging.level.com.br.chatbotplatformskeleton=DEBUG

# Logback JSON Encoding (for structured logs)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/chatbot-platform.log
logging.file.max-size=10MB
logging.file.max-history=10

