# ============================================================
# PRODUCTION CONFIGURATION
# Use environment variables for sensitive data
# ============================================================

# Application name
spring.application.name=chatbot-platform-skeleton

# ============================================================
# DATABASE CONFIGURATION (MySQL - Production)
# ============================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:chatbot_prod}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&maxConnections=20
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1

# ============================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================================
# JWT SECURITY CONFIGURATION
# IMPORTANT: Set via environment variables, NEVER hardcode
# ============================================================
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ============================================================
# CORS CONFIGURATION
# Configure trusted domains
# ============================================================
cors.allowed-origins=${CORS_ORIGINS:https://chatbot.company.com}

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api/v1
server.compression.enabled=true
server.compression.min-response-size=1024

# HTTPS Configuration
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEY_STORE}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD}
server.ssl.key-store-type=PKCS12

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging.level.root=INFO
logging.level.com.br.chatbot=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN

# Structured logging format (JSON compatible)
logging.pattern.console=%d{ISO8601} %-5p [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{ISO8601} %-5p [%thread] %logger{36} - %msg%n

# ============================================================
# FLYWAY MIGRATION
# ============================================================
# Disabled - migrations are handled by docker-entrypoint-initdb.d

# ============================================================
# ACTUATOR & MONITORING
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Prometheus Metrics
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=production

# ============================================================
# SECURITY HEADERS
# ============================================================
# HTTP Security Headers (configured via Spring Security)
# See SecurityConfig.java for implementation

# ============================================================
# RATE LIMITING (via Bucket4J)
# ============================================================
# Configured via filters/interceptors in application code
# Default: 1000 requests per minute per IP

# ============================================================
# CACHE CONFIGURATION (Optional)
# ============================================================
spring.cache.type=simple

# ============================================================
# ERROR HANDLING
# ============================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# ============================================================
# THREAD POOL CONFIGURATION
# ============================================================
spring.threads.virtual.enabled=false
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=20
spring.task.scheduling.pool.size=5

# ============================================================
# TIMEOUTS
# ============================================================
spring.mvc.async.request-timeout=30000
