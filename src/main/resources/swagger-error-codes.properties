# Swagger Error Codes
# This file centralizes all Swagger error codes for cleaner code management.

# General Errors
ERROR_400=Bad Request
ERROR_401=Unauthorized
ERROR_403=Forbidden
ERROR_404=Not Found
ERROR_500=Internal Server Error

# Specific Errors
ERROR_VALIDATION_FAILED=Dados de entrada invalidos
ERROR_RESOURCE_NOT_FOUND=Resource Not Found
ERROR_OPERATION_NOT_ALLOWED=Operation Not Allowed
ERROR_INTERNAL_SERVER=An unexpected error occurred
