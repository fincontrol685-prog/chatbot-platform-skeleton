version: '3.9'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: chatbot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_change_me}
      MYSQL_DATABASE: ${DB_NAME:-chatbot_prod}
      MYSQL_USER: ${DB_USERNAME:-chatbot_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-db_password_change_me}
      TZ: 'UTC'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - chatbot_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # Backend Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: chatbot-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      
      # Database
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-chatbot_prod}
      DB_USERNAME: ${DB_USERNAME:-chatbot_user}
      DB_PASSWORD: ${DB_PASSWORD:-db_password_change_me}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_me_in_production}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      
      # Server
      SERVER_PORT: 8080
      
      # SSL (if needed)
      SSL_ENABLED: ${SSL_ENABLED:-false}
      
      # Logging
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_BR_CHATBOT: INFO
      
      # JVM
      JAVA_OPTS: "-Xmx512m -Xms256m -XX:+UseG1GC"
    
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    
    depends_on:
      mysql:
        condition: service_healthy
    
    networks:
      - chatbot_network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    
    security_opt:
      - no-new-privileges:true
    
    restart: on-failure:5

  # Frontend Application (Optional - built as part of nginx)
  # Note: Frontend is built during image creation and served via nginx
  # To rebuild frontend: docker-compose build nginx --no-cache

  # Nginx - Reverse Proxy and Static Files
  nginx:
    image: nginx:alpine
    container_name: chatbot-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - chatbot_network
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Prometheus - Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: chatbot-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - chatbot_network
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Grafana - Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: chatbot-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin_change_me}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - chatbot_network
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  chatbot_network:
    driver: bridge

